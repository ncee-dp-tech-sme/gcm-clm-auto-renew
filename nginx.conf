# Nginx configuration for Certificate Monitor with ACME
# This configuration sets up nginx as a reverse proxy to the Node.js application
# using certificates obtained from the ACME client

# Upstream backend server
upstream cert_monitor_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP server - redirect to HTTPS and serve ACME challenges
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # ACME challenge location
    location /.well-known/acme-challenge/ {
        root /Users/erwin/Documents/Projecten/Github_repos/personal_dev/ncee-dp-tech-sme/gcm-clm-auto-renew/public;
        try_files $uri =404;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost;

    # SSL certificate paths (from ACME client)
    ssl_certificate /Users/erwin/Documents/Projecten/Github_repos/personal_dev/ncee-dp-tech-sme/gcm-clm-auto-renew/acme-certificate.pem;
    ssl_certificate_key /Users/erwin/Documents/Projecten/Github_repos/personal_dev/ncee-dp-tech-sme/gcm-clm-auto-renew/acme-private-key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /usr/local/var/log/nginx/cert-monitor-access.log;
    error_log /usr/local/var/log/nginx/cert-monitor-error.log;

    # Root location - proxy to Node.js backend
    location / {
        proxy_pass http://cert_monitor_backend;
        proxy_http_version 1.1;
        
        # Proxy headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable caching for dynamic content
        proxy_cache_bypass $http_upgrade;
    }

    # Static files optimization
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://cert_monitor_backend;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

