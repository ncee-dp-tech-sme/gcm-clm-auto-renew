<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL/TLS Certificate Monitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 SSL/TLS Certificate Monitor</h1>
            <p class="subtitle">Track and compare certificate changes</p>
        </header>

        <div class="controls">
            <div class="url-input-group">
                <label for="urlInput"><strong>Target URL:</strong></label>
                <input
                    type="text"
                    id="urlInput"
                    placeholder="https://www.example.com"
                    class="url-input"
                />
                <button id="updateUrlBtn" class="btn-secondary">
                    <span class="btn-icon">💾</span> Update URL
                </button>
            </div>
            <div class="button-group">
                <button id="checkNowBtn" class="btn-primary">
                    <span class="btn-icon">🔄</span> Check Certificate
                </button>
                <button id="clearStorageBtn" class="btn-danger">
                    <span class="btn-icon">🗑️</span> Clear History
                </button>
            </div>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div id="loadingIndicator" class="loading">
            <div class="spinner"></div>
            <p>Fetching certificate information...</p>
        </div>

        <div id="certificatesContainer" class="certificates-container">
            <div id="noCertificates" class="no-certificates">
                <p>No certificates found. Click "Check Certificate Now" to fetch the current certificate.</p>
            </div>
        </div>

        <footer>
            <p>Last updated: <span id="lastUpdated">Never</span></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
