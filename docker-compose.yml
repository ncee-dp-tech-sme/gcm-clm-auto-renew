version: '3.8'

services:
  cert-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cert-monitor
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
      - VAULT_TOKEN_FILE=/vault-config/root-token.txt
    volumes:
      # Persist certificate data
      - cert-data:/app/certs
      # Persist application data (certificate history, configs)
      - app-data:/app/data
      # Persist logs
      - nginx-logs:/var/log/nginx
      - supervisor-logs:/var/log/supervisor
      # Mount vault config for root token
      - vault-config:/vault-config:ro
    restart: unless-stopped
    networks:
      - cert-monitor-network
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Vault server with automatic ACME configuration
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
      - VAULT_LOG_LEVEL=info
      - SKIP_SETCAP=true
    cap_add:
      - IPC_LOCK
    security_opt:
      - label=disable
    volumes:
      - vault-data:/vault/data
      - vault-logs:/vault/logs
      - ./vault-config.hcl:/vault/config/vault.hcl:ro
      - ./vault-init.sh:/vault-init.sh:ro
    networks:
      - cert-monitor-network
    command: server
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Vault initializer - runs once to configure PKI and ACME
  vault-init:
    image: hashicorp/vault:latest
    container_name: vault-init
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
    volumes:
      - ./vault-init.sh:/vault-init.sh:ro
      - vault-config:/vault-config
    networks:
      - cert-monitor-network
    depends_on:
      vault:
        condition: service_healthy
    command: /bin/sh /vault-init.sh
    restart: "no"

networks:
  cert-monitor-network:
    driver: bridge

volumes:
  cert-data:
    driver: local
  app-data:
    driver: local
  nginx-logs:
    driver: local
  supervisor-logs:
    driver: local
  vault-data:
    driver: local
  vault-logs:
    driver: local
  vault-config:
    driver: local

